mpc_controller_node:
  ros__parameters:
    use_sim_time: true
    dt: 0.02
    horizon_N: 15
    wheelbase_L: 0.33
    v_min: 0.0
    v_max: 4.0
    delta_max: 0.4
    a_min: -3.0
    a_max: 3.0
    ddelta_max: 1.0
    Q: [20.0, 10.0, 2.0, 1.0]
    Q_N: [40.0, 20.0, 4.0, 2.0]
    R: [1.0, 10.0]
    R_delta: [0.1, 5.0]
    solver_time_budget_ms: 10
    solver_max_iter: 4000
    soft_constraint_weight: 1000.0
    reference_mode: constant_speed
    path_csv: ''
    target_speed: 1.5
    search_window: 15
    odom_timeout_sec: 0.5
    stop_on_invalid_reference: true
    stop_on_solver_failure: true
    publish_drive_control: false
    drive_control_topic: /drive_control
    command_priority: 700
    command_active: true
    min_speed_for_steering_estimate: 0.2
